<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>福岡·月光冒險之旅</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="福岡行程">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 粉紫色系調色盤 */
            --main-purple: #4b0082;
            --soft-purple: #7b4397;
            --sailor-pink: #ff85a2;
            --moon-gold: #f9d423;
            --crystal-bg: rgba(255, 182, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-glow: 0 0 10px rgba(255, 133, 162, 0.8);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            /* 背景改為粉紫漸層星空 */
            background: linear-gradient(135deg, #1a0a2e 0%, #4a1d64 50%, #2a0a2e 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 浮動的守護星背景裝飾 */
        .bg-symbols {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
            opacity: 0.3;
        }

        .bg-symbol {
            position: absolute;
            color: var(--sailor-pink);
            font-size: 2rem;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        header {
            background: rgba(26, 10, 46, 0.8);
            backdrop-filter: blur(10px);
            color: var(--moon-gold);
            padding: 55px 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--sailor-pink);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(255, 133, 162, 0.3);
        }

        header h1 {
            margin: 0; font-size: 1.3rem; letter-spacing: 5px;
            text-shadow: var(--text-glow);
            font-weight: 700;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .day-panel {
            display: none;
            position: relative;
            min-height: 100%;
        }
